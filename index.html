<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestão Financeira</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f0eb;color:#1a1a1a;min-height:100vh;padding:16px}
h1{font-size:18px;font-weight:700;margin-bottom:14px;color:#1a1a1a;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.layout{display:grid;grid-template-columns:1fr 340px;gap:16px;align-items:start}
.left{min-width:0}
.right{display:flex;flex-direction:column;gap:14px}
.card{background:#fff;border-radius:12px;padding:16px;border:1px solid #e8e8e2}
.tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:14px}
.tab{padding:4px 11px;border-radius:7px;border:1px solid #ddd;background:transparent;cursor:pointer;font-size:11px;color:#666;transition:all .15s}
.tab.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.tab:hover:not(.active){background:#f5f5f0}
.alert-neg{background:#fff0f0;color:#c0392b;border-radius:8px;padding:7px 11px;font-size:12px;margin-bottom:10px;border:1px solid #fcc}
.alert-pos{background:#f0fff4;color:#1a6b3c;border-radius:8px;padding:7px 11px;font-size:12px;margin-bottom:10px;border:1px solid #b2dfcc}
.caixa-input{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.caixa-input label{font-size:12px;color:#888;white-space:nowrap}
.caixa-input input{font-size:13px;padding:4px 8px;border-radius:7px;border:1px solid #ddd;background:#fff;color:#1a1a1a;width:130px}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.metric{background:#f7f7f2;border-radius:8px;padding:10px 12px}
.mlabel{font-size:11px;color:#888;margin-bottom:3px}
.mval{font-size:15px;font-weight:700}
.pos{color:#1a6b3c}.neg{color:#c0392b}
.legend{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:6px;font-size:11px;color:#888}
.legend span{display:flex;align-items:center;gap:4px}
.ldot{width:9px;height:9px;border-radius:2px;display:inline-block}
.chart-wrap{position:relative;width:100%;height:180px;margin-bottom:14px}
.stitle{font-size:11px;font-weight:700;color:#888;margin:14px 0 6px;text-transform:uppercase;letter-spacing:.05em;display:flex;justify-content:space-between;align-items:center}
.row{display:flex;justify-content:space-between;align-items:center;padding:6px 8px;font-size:13px;border-bottom:1px solid #f0f0eb;gap:4px;flex-wrap:wrap}
.row:last-child{border-bottom:none}
.badge{font-size:10px;padding:2px 6px;border-radius:20px;flex-shrink:0}
.bf{background:#e8f4fd;color:#1565a0}.bv{background:#fff8e1;color:#8a6200}
.pago-btn{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0;cursor:pointer;border:none;font-weight:700}
.ps{background:#e8f5e9;color:#1a6b3c}.pn{background:#ffebee;color:#c0392b}
.del{background:none;border:none;cursor:pointer;color:#ccc;font-size:15px;padding:0 2px;line-height:1;transition:color .15s;flex-shrink:0}
.del:hover{color:#c0392b}
.toggle-form{font-size:10px;padding:3px 9px;border-radius:7px;border:1px solid #ddd;background:transparent;cursor:pointer;color:#666}
.add-form{border:1px solid #e8e8e2;border-radius:8px;padding:10px;margin-top:6px;background:#fafaf8}
.add-form input,.add-form select{font-size:12px;padding:5px 8px;border-radius:7px;border:1px solid #ddd;background:#fff;color:#1a1a1a;width:100%;margin-bottom:6px}
.g3{display:grid;grid-template-columns:1fr 1fr 80px;gap:6px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.btn-cancel{font-size:11px;padding:5px 12px;border-radius:7px;border:1px solid #ddd;background:transparent;cursor:pointer;color:#666}
.btn-save{font-size:11px;padding:5px 14px;border-radius:7px;border:1px solid #1a6b3c;background:#e8f5e9;cursor:pointer;color:#1a6b3c;font-weight:700}
.total-row{font-weight:700;background:#fafaf8}
.card-title{font-size:13px;font-weight:700;color:#1a1a1a;margin-bottom:12px}
.anual-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.anual-metric{background:#f7f7f2;border-radius:8px;padding:10px 12px}
.rank-row{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid #f0f0eb;font-size:12px}
.rank-row:last-child{border-bottom:none}
.rank-num{font-size:10px;font-weight:700;color:#888;width:14px;flex-shrink:0}
.rank-name{flex:1;color:#1a1a1a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rank-bar-wrap{width:70px;height:5px;background:#f0f0eb;border-radius:3px;flex-shrink:0}
.rank-bar{height:5px;border-radius:3px;background:#D85A30}
.rank-val{font-weight:700;color:#c0392b;min-width:68px;text-align:right;font-size:11px}
.anual-fonte-row{display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px solid #f0f0eb}
.anual-fonte-row:last-child{border-bottom:none}
.save-ind{font-size:10px;color:#1a6b3c;opacity:0;transition:opacity .3s}
.save-ind.show{opacity:1}
.venc-tag{font-size:10px;color:#888;background:#f0f0eb;border-radius:5px;padding:1px 5px;flex-shrink:0;white-space:nowrap}
.venc-tag.alerta{background:#fff0f0;color:#c0392b;font-weight:700}
.venc-input{width:44px;font-size:10px;padding:2px 4px;border-radius:5px;border:1px solid #ddd;text-align:center;color:#888;background:#fff}
.btn-backup{font-size:11px;padding:4px 10px;border-radius:7px;border:1px solid #ddd;background:#fff;cursor:pointer;color:#666}
.btn-backup:hover{background:#f5f5f0}
.btn-import-label{font-size:11px;padding:4px 10px;border-radius:7px;border:1px solid #378ADD;background:#e8f4fd;cursor:pointer;color:#1565a0;display:inline-block}
.btn-import-label:hover{background:#d0e8f8}
.modal-bg{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:999}
.modal{background:#fff;border-radius:14px;padding:28px;max-width:400px;width:90%;text-align:center}
.modal h2{font-size:17px;font-weight:700;margin-bottom:8px}
.modal p{font-size:13px;color:#666;margin-bottom:22px;line-height:1.6}
.btn-m-import{font-size:13px;padding:11px;border-radius:8px;border:1px solid #378ADD;background:#e8f4fd;cursor:pointer;color:#1565a0;font-weight:700;width:100%;margin-bottom:10px}
.btn-m-new{font-size:13px;padding:11px;border-radius:8px;border:1px solid #ddd;background:transparent;cursor:pointer;color:#666;width:100%}
@media(max-width:820px){.layout{grid-template-columns:1fr}.metrics{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<div class="modal-bg" id="modal" style="display:none">
  <div class="modal">
    <h2>Primeiro acesso detectado</h2>
    <p>Este navegador ainda não tem dados salvos.<br>Importe um backup ou comece do zero com os dados padrão.</p>
    <label class="btn-m-import">
      Importar backup (JSON)
      <input type="file" accept=".json" style="display:none" onchange="importFromModal(this)">
    </label>
    <button class="btn-m-new" onclick="startFresh()">Começar do zero</button>
  </div>
</div>

<h1>
  Gestão Financeira
  <span id="save-ind" class="save-ind">✓ Salvo</span>
  <span style="margin-left:auto;display:flex;gap:6px;align-items:center">
    <button class="btn-backup" onclick="exportBackup()">Exportar backup</button>
    <label class="btn-import-label">
      Importar backup
      <input type="file" accept=".json" style="display:none" onchange="importBackup(this)">
    </label>
  </span>
</h1>

<div class="layout">
  <div class="left">
    <div class="card">
      <div class="tabs" id="tabs"></div>
      <div id="alert-box"></div>
      <div class="caixa-input">
        <label>Caixa mensal (R$):</label>
        <input type="number" id="caixa-edit" step="0.01" onchange="updateCaixa(this.value)">
      </div>
      <div class="metrics" id="metrics"></div>
      <div class="legend">
        <span><span class="ldot" style="background:#1D9E75"></span>Caixa</span>
        <span><span class="ldot" style="background:#D85A30"></span>Despesas</span>
        <span><span class="ldot" style="background:#378ADD"></span>Saldo</span>
      </div>
      <div class="chart-wrap"><canvas id="barChart" role="img" aria-label="Gráfico mensal">Comparativo mensal.</canvas></div>
      <div id="receitas-section"></div>
      <div id="despesas-section"></div>
    </div>
  </div>
  <div class="right">
    <div class="card">
      <div class="card-title">Resumo anual</div>
      <div class="anual-grid" id="anual-metrics"></div>
      <div class="stitle" style="margin-top:4px">Receita por fonte</div>
      <div id="anual-fontes"></div>
      <div class="chart-wrap" style="height:150px;margin-top:10px">
        <canvas id="pieChart" role="img" aria-label="Despesas fixas vs variáveis">Fixas vs variáveis.</canvas>
      </div>
      <div class="legend" id="pie-legend" style="justify-content:center;margin-top:6px"></div>
    </div>
    <div class="card">
      <div class="card-title">Ranking de despesas</div>
      <div id="ranking"></div>
    </div>
  </div>
</div>

const SK='fin_v3';
const SK_INIT='fin_init_v3';
const meses=Object.keys(DEFAULT);
let DATA={};
let mes="Março";
let barChart=null,pieChart=null;
let showAddRec=false,showAddDesp=false;

function fmt(v){return'R$ '+parseFloat(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})}
function fmtK(v){return v>=1000?'R$'+(v/1000).toFixed(1)+'k':'R$'+Math.round(v)}
function getDia(){return new Date().getDate()}

function saveData(){
  try{
    localStorage.setItem(SK,JSON.stringify(DATA));
    localStorage.setItem(SK_INIT,'1');
    const el=document.getElementById('save-ind');
    el.classList.add('show');
    setTimeout(()=>el.classList.remove('show'),1500);
  }catch(e){}
}

function exportBackup(){
  const blob=new Blob([JSON.stringify(DATA,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='financeiro_backup_'+new Date().toISOString().split('T')[0]+'.json';
  a.click();
}

function importBackup(input){
  const f=input.files[0];
  if(!f)return;
  const r=new FileReader();
  r.onload=e=>{
    try{
      const p=JSON.parse(e.target.result);
      Object.keys(p).forEach(k=>{DATA[k]=p[k]});
      saveData();render();
      alert('Backup importado com sucesso!');
    }catch(err){alert('Arquivo inválido.')}
  };
  r.readAsText(f);
  input.value='';
}

function importFromModal(input){
  const f=input.files[0];
  if(!f)return;
  const r=new FileReader();
  r.onload=e=>{
    try{
      DATA=JSON.parse(e.target.result);
      saveData();
      document.getElementById('modal').style.display='none';
      render();
    }catch(err){alert('Arquivo inválido.')}
  };
  r.readAsText(f);
}

function startFresh(){
  DATA=cp(DEFAULT);
  saveData();
  document.getElementById('modal').style.display='none';
  render();
}

function vencTag(venc,pago){
  if(!venc)return'';
  if(pago)return`<span class="venc-tag">dia ${venc}</span>`;
  const diff=venc-getDia();
  if(diff<0)return`<span class="venc-tag alerta">venceu dia ${venc}</span>`;
  if(diff<=3)return`<span class="venc-tag alerta">vence dia ${venc}</span>`;
  return`<span class="venc-tag">dia ${venc}</span>`;
}

function renderTabs(){
  document.getElementById('tabs').innerHTML=meses.map(m2=>`<button class="tab${m2===mes?' active':''}" onclick="selMes('${m2}')">${m2.substring(0,3)}</button>`).join('');
}
function selMes(m2){mes=m2;showAddRec=false;showAddDesp=false;render()}
function updateCaixa(v){DATA[mes].caixa=parseFloat(v)||0;saveData();renderMetrics();renderBarChart();renderAnual();renderRanking()}
function updateVenc(i,v){DATA[mes].despesas[i].venc=v?parseInt(v):null;saveData();renderDespesas()}
function togglePago(i){DATA[mes].despesas[i].pago=!DATA[mes].despesas[i].pago;saveData();render()}
function delReceita(i){DATA[mes].receitas.splice(i,1);saveData();render()}
function delDespesa(i){DATA[mes].despesas.splice(i,1);saveData();render()}

function addReceita(){
  const n=document.getElementById('rn').value.trim();
  const v=parseFloat(document.getElementById('rv').value);
  if(!n||isNaN(v)||v<=0)return;
  DATA[mes].receitas.push({nome:n,valor:v});
  showAddRec=false;saveData();render();
}

  const n=document.getElementById('dn').value.trim();

  const t=document.getElementById('dt').value;
  const vc=document.getElementById('dvc').value;
  if(!n||isNaN(v)||v<=0)return;
  DATA[mes].despesas.push({nome:n,valor:v,tipo:t,pago:false,venc:vc?parseInt(vc):null});
  showAddDesp=false;saveData();render();
}

function renderMetrics(){
  const d=DATA[mes];
  const td=d.despesas.reduce((s,x)=>s+x.valor,0);
  const saldo=d.caixa-td;
  const pend=d.despesas.filter(x=>!x.pago).reduce((s,x)=>s+x.valor,0);
  document.getElementById('alert-box').innerHTML=saldo<0
    ?`<div class="alert-neg">Saldo negativo de ${fmt(Math.abs(saldo))} em ${mes}</div>`
    :`<div class="alert-pos">Saldo positivo de ${fmt(saldo)} em ${mes}</div>`;
  document.getElementById('caixa-edit').value=d.caixa;
  document.getElementById('metrics').innerHTML=`
    <div class="metric"><div class="mlabel">Caixa</div><div class="mval">${fmt(d.caixa)}</div></div>
    <div class="metric"><div class="mlabel">Despesas</div><div class="mval neg">${fmt(td)}</div></div>
    <div class="metric"><div class="mlabel">Saldo</div><div class="mval ${saldo>=0?'pos':'neg'}">${fmt(saldo)}</div></div>
    <div class="metric"><div class="mlabel">Pendente</div><div class="mval ${pend>0?'neg':'pos'}">${fmt(pend)}</div></div>
  `;
}

function renderReceitas(){
  const d=DATA[mes];
  const tr=d.receitas.reduce((s,x)=>s+x.valor,0);
  document.getElementById('receitas-section').innerHTML=`
    <div class="stitle">Receitas<button class="toggle-form" onclick="showAddRec=!showAddRec;render()">+ adicionar</button></div>
    ${d.receitas.map((r,i)=>`
      <div class="row">
        <span style="flex:1">${r.nome}</span>
        <span style="font-weight:700;color:#1a6b3c">${fmt(r.valor)}</span>
        <button class="del" onclick="delReceita(${i})">×</button>
      </div>`).join('')}
    <div class="row total-row"><span>Total receitas</span><span style="color:#1a6b3c">${fmt(tr)}</span></div>
    ${showAddRec?`<div class="add-form">
      <div class="g2">
        <input id="rn" type="text" placeholder="Nome da receita">
        <input id="rv" type="number" placeholder="Valor (R$)" step="0.01" min="0">
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button class="btn-cancel" onclick="showAddRec=false;render()">Cancelar</button>
        <button class="btn-save" onclick="addReceita()">Salvar</button>
      </div>
    </div>`:''}
  `;
}

function renderDespesas(){
  const d=DATA[mes];
  const td=d.despesas.reduce((s,x)=>s+x.valor,0);
  document.getElementById('despesas-section').innerHTML=`
    <div class="stitle">Despesas<button class="toggle-form" onclick="showAddDesp=!showAddDesp;render()">+ adicionar</button></div>
    ${d.despesas.map((r,i)=>`
      <div class="row">
        <span style="flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:130px">${r.nome}</span>
        <span class="badge ${r.tipo==='fixa'?'bf':'bv'}">${r.tipo}</span>
        ${vencTag(r.venc,r.pago)}
        <input class="venc-input" type="number" min="1" max="31" placeholder="dia" value="${r.venc||''}"
          onchange="updateVenc(${i},this.value)" title="Dia de vencimento">
        <span style="font-weight:700;min-width:70px;text-align:right">${fmt(r.valor)}</span>
        <button class="pago-btn ${r.pago?'ps':'pn'}" onclick="togglePago(${i})">${r.pago?'✓':'!'}</button>
        <button class="del" onclick="delDespesa(${i})">×</button>
      </div>`).join('')}
    <div class="row total-row"><span>Total despesas</span><span style="color:#c0392b">${fmt(td)}</span></div>
    ${showAddDesp?`<div class="add-form">
      <div class="g3">
        <input id="dn" type="text" placeholder="Nome da despesa">
        <input id="dv" type="number" placeholder="Valor (R$)" step="0.01" min="0">
        <input id="dvc" type="number" placeholder="Dia venc." min="1" max="31">
      </div>
      <select id="dt"><option value="fixa">Fixa</option><option value="variável">Variável</option></select>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:6px">
        <button class="btn-cancel" onclick="showAddDesp=false;render()">Cancelar</button>
        <button class="btn-save" onclick="addDespesa()">Salvar</button>
      </div>
    </div>`:''}
  `;
}

function renderBarChart(){
  const desp=meses.map(m2=>parseFloat(DATA[m2].despesas.reduce((s,x)=>s+x.valor,0).toFixed(2)));
  const cxs=meses.map(m2=>DATA[m2].caixa);
  const sal=meses.map(m2=>parseFloat((DATA[m2].caixa-DATA[m2].despesas.reduce((s,x)=>s+x.valor,0)).toFixed(2)));
  if(barChart)barChart.destroy();
  barChart=new Chart(document.getElementById('barChart'),{
    type:'bar',
    data:{labels:meses.map(m2=>m2.substring(0,3)),datasets:[
      {label:'Caixa',data:cxs,backgroundColor:'#1D9E75',borderRadius:3},
      {label:'Despesas',data:desp,backgroundColor:'#D85A30',borderRadius:3},
      {label:'Saldo',data:sal,type:'line',borderColor:'#378ADD',backgroundColor:'#378ADD',pointBackgroundColor:'#378ADD',fill:false,tension:0.3,borderDash:[4,3],pointRadius:3}
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>ctx.dataset.label+': '+fmt(ctx.raw)}}},
      scales:{x:{ticks:{font:{size:10},autoSkip:false,maxRotation:0},grid:{display:false}},
              y:{ticks:{font:{size:10},callback:v=>fmtK(v)},grid:{color:'rgba(0,0,0,0.04)'}}}}
  });
}

function renderAnual(){
  let tRec=0,tDesp=0,tCaixa=0,tFixa=0,tVar=0;
  const fontes={};
  meses.forEach(m2=>{
    const d=DATA[m2];
    tRec+=d.receitas.reduce((s,x)=>s+x.valor,0);
    tDesp+=d.despesas.reduce((s,x)=>s+x.valor,0);
    tCaixa+=d.caixa;
    d.receitas.forEach(r=>{fontes[r.nome]=(fontes[r.nome]||0)+r.valor});
    d.despesas.forEach(r=>{r.tipo==='fixa'?tFixa+=r.valor:tVar+=r.valor});
  });
  const sA=tCaixa-tDesp;
  document.getElementById('anual-metrics').innerHTML=`
    <div class="anual-metric"><div class="mlabel">Faturamento anual</div><div class="mval pos">${fmt(tRec)}</div></div>
    <div class="anual-metric"><div class="mlabel">Despesas anuais</div><div class="mval neg">${fmt(tDesp)}</div></div>
    <div class="anual-metric"><div class="mlabel">Caixa total</div><div class="mval">${fmt(tCaixa)}</div></div>
    <div class="anual-metric"><div class="mlabel">Saldo anual</div><div class="mval ${sA>=0?'pos':'neg'}">${fmt(sA)}</div></div>
  `;
  const fo=Object.entries(fontes).sort((a,b)=>b[1]-a[1]).slice(0,6);
  document.getElementById('anual-fontes').innerHTML=fo.map(([n,v])=>`
    <div class="anual-fonte-row"><span style="color:#666">${n}</span><span style="font-weight:700;color:#1a6b3c">${fmt(v)}</span></div>`).join('');
  if(pieChart)pieChart.destroy();
  const tot=tFixa+tVar;
  pieChart=new Chart(document.getElementById('pieChart'),{
    type:'doughnut',
    data:{labels:['Fixas','Variáveis'],datasets:[{data:[parseFloat(tFixa.toFixed(2)),parseFloat(tVar.toFixed(2))],backgroundColor:['#378ADD','#EF9F27'],borderWidth:0}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'65%',plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>ctx.label+': '+fmt(ctx.raw)}}}}
  });
  document.getElementById('pie-legend').innerHTML=`
    <span style="display:flex;align-items:center;gap:4px"><span class="ldot" style="background:#378ADD"></span>Fixas ${tot>0?Math.round(tFixa/tot*100):0}%</span>
    <span style="display:flex;align-items:center;gap:4px"><span class="ldot" style="background:#EF9F27"></span>Variáveis ${tot>0?Math.round(tVar/tot*100):0}%</span>
  `;
}

function renderRanking(){
  const acum={};
  meses.forEach(m2=>{DATA[m2].despesas.forEach(d=>{acum[d.nome]=(acum[d.nome]||0)+d.valor})});
  const sorted=Object.entries(acum).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const max=sorted[0]?sorted[0][1]:1;
  document.getElementById('ranking').innerHTML=sorted.map(([nome,val],i)=>`
    <div class="rank-row">
      <span class="rank-num">${i+1}</span>
      <span class="rank-name" title="${nome}">${nome}</span>
      <div class="rank-bar-wrap"><div class="rank-bar" style="width:${Math.round(val/max*100)}%"></div></div>
      <span class="rank-val">${fmt(val)}</span>
    </div>`).join('');
}

function render(){
  renderTabs();renderMetrics();renderBarChart();
  renderReceitas();renderDespesas();renderAnual();renderRanking();
}

// Inicialização
if(!localStorage.getItem(SK_INIT)){
  document.getElementById('modal').style.display='flex';
} else {
  try{DATA=JSON.parse(localStorage.getItem(SK))||cp(DEFAULT)}catch(e){DATA=cp(DEFAULT)}
  render();
}
</script>
</body>
</html>
